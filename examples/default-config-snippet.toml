# Example: Default config.toml (keeps GPT-5.5)

# This is YOUR main config.toml — it stays untouched.
# The glm52 profile contains its own provider definition.

model = "gpt-5.5"                    # ← your default stays as-is
model_provider = "openai"
model_context_window = 1000000

# ... all your MCP servers, plugins, features stay here ...
#
# Do not add [model_providers.zai_coding] here. Keeping that provider
# inside glm52.config.toml prevents the default /model menu from being
# narrowed to the local GLM proxy's model catalog.
